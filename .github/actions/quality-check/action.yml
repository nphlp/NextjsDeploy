name: Quality check
description: Run code quality checks (lint, format, or type)

inputs:
    check-type:
        description: "Type of check to run (lint, format, type)"
        required: true

runs:
    using: "composite"
    steps:
        - name: Run lint check
          if: inputs.check-type == 'lint'
          run: bun run lint
          shell: bash

        - name: Run format check
          if: inputs.check-type == 'format'
          run: bun run format
          shell: bash

        - name: Run type check
          if: inputs.check-type == 'type'
          run: bun run prisma:generate && bun run type
          shell: bash
          env:
              DATABASE_URL: "postgresql://user:pass@localhost:5432/db"

        - name: Run tests
          if: inputs.check-type == 'test'
          run: bun run prisma:generate && bun run test:run
          shell: bash
          env:
              DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
              NEXT_PUBLIC_BASE_URL: "https://example.com"
